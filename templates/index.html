<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Core | Server Command Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(5, 15, 25, 1) 0%, rgba(0, 0, 0, 1) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* animated grid background */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* animated glow orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
            animation: floatOrb 18s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 40vw;
            height: 40vw;
            background: #00c6ff;
            top: -15%;
            left: -10%;
            animation-duration: 22s;
        }

        .orb-2 {
            width: 35vw;
            height: 35vw;
            background: #7a2eff;
            bottom: -10%;
            right: -5%;
            animation-duration: 25s;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 25vw;
            height: 25vw;
            background: #ff5e7c;
            top: 40%;
            left: 70%;
            animation-duration: 28s;
            opacity: 0.2;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(5%, 8%) scale(1.1);
            }
        }

        /* Main card - glassmorphic + premium */
        .dashboard {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 580px;
            background: rgba(12, 20, 30, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(0, 255, 255, 0.1) inset;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .dashboard:hover {
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 15px rgba(0, 210, 255, 0.2);
        }

        /* header section */
        .header {
            padding: 2rem 2rem 1rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .title-section h2 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #FFFFFF, #88ddff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .title-section h2 svg {
            width: 28px;
            height: 28px;
            stroke: #0cf;
            fill: none;
            stroke-width: 1.8;
        }

        .badge {
            background: rgba(0, 200, 255, 0.15);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            border: 1px solid rgba(0, 200, 255, 0.4);
            color: #b0f0ff;
        }

        /* main status area */
        .status-panel {
            padding: 1rem 2rem 2rem 2rem;
        }

        .status-glass {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            text-align: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
        }

        .status-icon {
            font-size: 4.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            filter: drop-shadow(0 0 8px rgba(0,255,200,0.4));
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .server-state {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .state-text {
            background: linear-gradient(145deg, #eef, #ffffff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .pulse-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 180, 0.7); opacity: 1; }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 180, 0); opacity: 0.8; }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 180, 0); opacity: 1; }
        }

        .timestamp {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #8aaacb;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            margin-top: 8px;
        }

        .metrics-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .metric-card {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1.5rem;
            padding: 1rem 0.8rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }

        .metric-card:hover {
            transform: translateY(-3px);
            background: rgba(20, 40, 60, 0.5);
            border-color: rgba(0, 255, 210, 0.3);
        }

        .metric-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            color: #8eb3d0;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 1.7rem;
            font-weight: 700;
            font-family: monospace;
            color: #eef5ff;
        }

        .metric-unit {
            font-size: 0.8rem;
            color: #6e9ac0;
        }

        .footer-note {
            margin-top: 24px;
            font-size: 0.7rem;
            text-align: center;
            color: rgba(180, 210, 240, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 1.2rem;
        }

        /* loader / transition */
        .fa-spin-custom {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        button {
            background: none;
            border: none;
        }

        .refresh-btn {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #bcf0ff;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .refresh-btn:hover {
            background: rgba(0, 200, 255, 0.2);
            border-color: #0cf;
            color: white;
            transform: scale(0.97);
        }

        /* responsive */
        @media (max-width: 500px) {
            .dashboard {
                border-radius: 2rem;
            }
            .server-state {
                font-size: 1.8rem;
            }
            .status-icon {
                font-size: 3.2rem;
            }
            .metric-value {
                font-size: 1.2rem;
            }
            .header {
                padding: 1.2rem 1.2rem 0.6rem 1.2rem;
            }
            .status-panel {
                padding: 0.5rem 1.2rem 1.8rem 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="dashboard">
    <div class="header">
        <div class="title-section">
             
            <div class="badge">  ⚡ Whatsapp Bot Webhook Gateway</div>
        </div>
        <button class="refresh-btn" id="manualRefreshBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 4v6h-6M1 20v-6h6" stroke="currentColor" stroke-linecap="round"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" stroke="currentColor"/>
            </svg>
            Force sync
        </button>
    </div>

    <div class="status-panel">
        <div class="status-glass">
            <div class="status-icon" id="statusIcon">🌀</div>
            <div class="server-state">
                <span class="state-text" id="stateText">Initializing</span>
                <span id="pulseDot" class="pulse-dot" style="background-color: #ffaa44;"></span>
            </div>
            <div class="timestamp" id="timestampDisplay">—</div>

            <div class="metrics-row">
                <div class="metric-card">
                    <div class="metric-label">LATENCY</div>
                    <div class="metric-value" id="latencyValue">— <span class="metric-unit">ms</span></div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">RESPONSE CODE</div>
                    <div class="metric-value" id="httpCode">—</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">UPTIME STREAM</div>
                    <div class="metric-value" id="checkCount">0 <span class="metric-unit">checks</span></div>
                </div>
            </div>
        </div>

        <div class="footer-note">
            <span>🔐 secure heartbeat</span>
            <span>🔄 live every 3s</span>
            <span id="nextCheckHint">next check in 3s</span>
        </div>
    </div>
</div>

<script>
    // --- DOM elements
    const stateTextEl = document.getElementById('stateText');
    const statusIconEl = document.getElementById('statusIcon');
    const pulseDot = document.getElementById('pulseDot');
    const timestampDisplay = document.getElementById('timestampDisplay');
    const latencyValueSpan = document.getElementById('latencyValue');
    const httpCodeSpan = document.getElementById('httpCode');
    const checkCountSpan = document.getElementById('checkCount');
    const nextCheckHint = document.getElementById('nextCheckHint');

    // state
    let isServerUp = false;          // current derived status
    let lastCheckTime = null;        // timestamp of last fetch start
    let successCount = 0;            // total successful checks (for fun)
    let totalChecks = 0;             // total attempts
    let intervalId = null;
    let countdownInterval = null;     // for next check hint
    let secondsUntilNext = 3;

    // Helper: update UI with latest data
    function updateUI(statusUp, latencyMs = null, httpStatus = null, errorFlag = false) {
        if (statusUp) {
            stateTextEl.innerText = 'OPERATIONAL';
            statusIconEl.innerHTML = '🟢';
            pulseDot.style.backgroundColor = '#0fda8c';
            pulseDot.style.boxShadow = '0 0 0 0 rgba(15, 218, 140, 0.7)';
            // set glowing effect to icon
            statusIconEl.style.filter = 'drop-shadow(0 0 10px #0fda8c)';
        } else {
            stateTextEl.innerText = 'DEGRADED';
            statusIconEl.innerHTML = '🔴';
            pulseDot.style.backgroundColor = '#ff4d4d';
            pulseDot.style.boxShadow = '0 0 0 0 rgba(255, 77, 77, 0.7)';
            statusIconEl.style.filter = 'drop-shadow(0 0 6px #ff3b3b)';
        }

        if (latencyMs !== null && !errorFlag) {
            latencyValueSpan.innerHTML = `${Math.floor(latencyMs)} <span class="metric-unit">ms</span>`;
        } else if (errorFlag) {
            latencyValueSpan.innerHTML = `⚠️ <span class="metric-unit">fail</span>`;
        }

        if (httpStatus !== null && !errorFlag) {
            let colorClass = '';
            if (httpStatus >= 200 && httpStatus < 300) httpCodeSpan.innerHTML = `${httpStatus} ✅`;
            else if (httpStatus >= 400) httpCodeSpan.innerHTML = `${httpStatus} ⚠️`;
            else httpCodeSpan.innerHTML = `${httpStatus}`;
        } else if (errorFlag) {
            httpCodeSpan.innerHTML = `❌ no response`;
        }

        // update total check count display (show only successful OR total? show successful checks for uptime vibe)
        checkCountSpan.innerHTML = `${successCount} <span class="metric-unit">ok</span>`;
    }

    // format timestamp nicely
    function formatTime(date) {
        if (!date) return '—';
        return date.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit', second:'2-digit' });
    }

    // perform actual check to /status endpoint
    async function performCheck() {
        const startTime = performance.now();
        let fetchOk = false;
        let responseStatus = null;
        let errorOccurred = false;
        let latencyValue = null;

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000); // 5s timeout
            const res = await fetch('/status', { signal: controller.signal });
            clearTimeout(timeoutId);
            
            const endTime = performance.now();
            latencyValue = endTime - startTime;
            responseStatus = res.status;

            // we just need to know if server responded with 2xx range or any valid json? basically success if any response < 500?
            // treat any response (even 404 but server alive?) we'll assume server is up if fetch resolves. But usually /status returns 200
            if (res.ok || (res.status >= 200 && res.status < 600)) {
                // even 400s means server is responding but maybe endpoint misconfig? but for this demo, server "running" means fetch gets response
                fetchOk = true;
                // try parse json just for consistency, but not needed
                await res.clone().json().catch(() => {});
            } else {
                // non-2xx but server responded, consider up but degraded? we treat as operational because server responded
                fetchOk = true;
            }
        } catch (err) {
            // network error / timeout / failed to fetch
            errorOccurred = true;
            fetchOk = false;
            latencyValue = null;
            responseStatus = null;
        }

        totalChecks++;
        const now = new Date();
        lastCheckTime = now;
        timestampDisplay.innerText = `last probe · ${formatTime(now)}`;

        let serverUp = fetchOk && !errorOccurred;

        // if fetchOk but responseStatus indicates server error 5xx, we could mark as down? but /status likely fine. We keep true if fetch resolves.
        if (serverUp) {
            successCount++;
        }

        isServerUp = serverUp;
        updateUI(isServerUp, latencyValue, responseStatus, errorOccurred);
        return { serverUp, latency: latencyValue, statusCode: responseStatus, errorOccurred };
    }

    // refresh countdown UI for next check
    function startCountdownUI() {
        if (countdownInterval) clearInterval(countdownInterval);
        secondsUntilNext = 3;
        nextCheckHint.innerText = `↻ next in ${secondsUntilNext}s`;
        countdownInterval = setInterval(() => {
            if (secondsUntilNext <= 1) {
                secondsUntilNext = 3;
                nextCheckHint.innerText = `🔄 checking...`;
            } else {
                secondsUntilNext--;
                nextCheckHint.innerText = `↻ next in ${secondsUntilNext}s`;
            }
        }, 1000);
    }

    // main loop: periodic check + counter sync
    let isChecking = false;
    async function tickAndSchedule() {
        if (isChecking) return; // avoid overlapping
        isChecking = true;
        await performCheck();
        isChecking = false;
    }

    function startPeriodic() {
        if (intervalId) clearInterval(intervalId);
        // immediate run
        tickAndSchedule();
        // set interval for 3000 ms
        intervalId = setInterval(() => {
            tickAndSchedule();
        }, 3000);
        startCountdownUI();
    }

    // manual force refresh with visual feedback
    async function manualRefresh() {
        // disable button style feedback
        const btn = document.getElementById('manualRefreshBtn');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 0.6s linear infinite;"><path d="M23 4v6h-6M1 20v-6h6" stroke="currentColor" stroke-linecap="round"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" stroke="currentColor"/></svg> syncing...`;
        btn.disabled = true;
        try {
            await tickAndSchedule();
            // also reset countdown visual to realign timer
            if (countdownInterval) {
                clearInterval(countdownInterval);
                secondsUntilNext = 3;
                nextCheckHint.innerText = `↻ next in 3s`;
                startCountdownUI();
            }
        } catch (e) {
            console.warn("manual check error", e);
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalHTML;
            // brief flash
            setTimeout(() => {}, 100);
        }
    }

    // extra check for initial animation: add special effect for /status endpoint response enrichment
    // we also simulate additional dynamic state (e.g. connection quality based on latency)
    // also add window load init
    window.addEventListener('DOMContentLoaded', () => {
        startPeriodic();
        const refreshBtn = document.getElementById('manualRefreshBtn');
        if (refreshBtn) refreshBtn.addEventListener('click', manualRefresh);
        
        // Optional: Add a fancy loading style for the very first render
        setTimeout(() => {
            // simple micro animation for status card
            const glassDiv = document.querySelector('.status-glass');
            if (glassDiv) glassDiv.style.transition = 'all 0.3s';
        }, 20);
    });

    // Add resilience: if the server status endpoint returns structured data like { status: "ok" } – we still good.
    // Enhance latency reading: show green/yellow/red depend on performance (future but nice)
    // extend updateUI to adapt color on latency threshold
    const originalUpdateUI = updateUI;
    window.updateUI = function(statusUp, latencyMs, httpStatus, errorFlag) {
        originalUpdateUI(statusUp, latencyMs, httpStatus, errorFlag);
        if (!errorFlag && latencyMs !== null && latencyMs !== undefined) {
            const latencyMetric = document.querySelector('.metric-card:first-child .metric-value');
            if (latencyMs < 100) {
                latencyMetric.style.color = '#8effa5';
            } else if (latencyMs < 400) {
                latencyMetric.style.color = '#ffee88';
            } else {
                latencyMetric.style.color = '#ff8866';
            }
        } else if (errorFlag) {
            const latencyMetric = document.querySelector('.metric-card:first-child .metric-value');
            if (latencyMetric) latencyMetric.style.color = '#ff8888';
        }
    };
    // override safely
    updateUI(isServerUp, null, null, true);
    
    // advanced: rewire to keep track of which style
    // final handler
    function finalInit() {
        // force re-declaration to use updated override
        window.updateUI = function(statusUp, latencyMs, httpStatus, errorFlag) {
            if (statusUp) {
                stateTextEl.innerText = 'OPERATIONAL';
                statusIconEl.innerHTML = '🟢';
                pulseDot.style.backgroundColor = '#0fda8c';
                statusIconEl.style.filter = 'drop-shadow(0 0 10px #0fda8c)';
            } else {
                stateTextEl.innerText = 'DEGRADED';
                statusIconEl.innerHTML = '🔴';
                pulseDot.style.backgroundColor = '#ff4d4d';
                statusIconEl.style.filter = 'drop-shadow(0 0 6px #ff3b3b)';
            }
            if (latencyMs !== null && !errorFlag) {
                latencyValueSpan.innerHTML = `${Math.floor(latencyMs)} <span class="metric-unit">ms</span>`;
                let latVal = Math.floor(latencyMs);
                if (latVal < 100) latencyValueSpan.style.color = '#8effa5';
                else if (latVal < 400) latencyValueSpan.style.color = '#ffee88';
                else latencyValueSpan.style.color = '#ff8866';
            } else if (errorFlag) {
                latencyValueSpan.innerHTML = `⚠️ <span class="metric-unit">fail</span>`;
                latencyValueSpan.style.color = '#ff8888';
            }
            if (httpStatus !== null && !errorFlag) {
                if (httpStatus >= 200 && httpStatus < 300) httpCodeSpan.innerHTML = `${httpStatus} ✅`;
                else if (httpStatus >= 400) httpCodeSpan.innerHTML = `${httpStatus} ⚠️`;
                else httpCodeSpan.innerHTML = `${httpStatus}`;
            } else if (errorFlag) {
                httpCodeSpan.innerHTML = `❌ no response`;
            }
            checkCountSpan.innerHTML = `${successCount} <span class="metric-unit">ok</span>`;
        };
        // refresh ui with current default
        window.updateUI(false, null, null, true);
        // if we have past data later it's fine
    }
    finalInit();
    // ensure performCheck uses updated UI binding after first load
    const origPerform = performCheck;
    window.performCheck = async function() {
        const startPerf = performance.now();
        try {
            const res = await fetch('/status');
            const endPerf = performance.now();
            const latency = endPerf - startPerf;
            const success = res.ok || (res.status >= 200);
            if (success) successCount++;
            totalChecks++;
            lastCheckTime = new Date();
            timestampDisplay.innerText = `last probe · ${formatTime(lastCheckTime)}`;
            window.updateUI(true, latency, res.status, false);
            return { serverUp: true, latency, statusCode: res.status };
        } catch (e) {
            totalChecks++;
            lastCheckTime = new Date();
            timestampDisplay.innerText = `last probe · ${formatTime(lastCheckTime)}`;
            window.updateUI(false, null, null, true);
            return { serverUp: false, errorOccurred: true };
        }
    };
    // replace tick to use new performCheck
    window.tickAndSchedule = async function() {
        if (window.isChecking) return;
        window.isChecking = true;
        await window.performCheck();
        window.isChecking = false;
    };
    // re-set intervals to avoid duplication but keep original running, but safer just redefine
    if (intervalId) clearInterval(intervalId);
    intervalId = setInterval(async () => {
        if (!window.isChecking) await window.tickAndSchedule();
    }, 3000);
    window.tickAndSchedule();
    if (countdownInterval) clearInterval(countdownInterval);
    startCountdownUI();
</script>
</body>
</html>
