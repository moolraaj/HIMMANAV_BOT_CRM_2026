<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* PAGE */
.page {
    width: 100%;
    height: 1000px;
    position: relative;
    page-break-after: always;
}

/* BACKGROUND IMAGE */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* DARK OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* TEXT */
.content {
    position: absolute;
    top: 80px;
    left: 60px;
    right: 60px;
    color: white;
}

.title {
    font-size: 32px;
    margin-bottom: 20px;
}

.desc {
    font-size: 16px;
    line-height: 1.6;
}

</style>
</head>

<body>

{% for day in itinerary %}
<div class="page">

    <img class="bg" src="{{ day.image }}" />
    <div class="overlay"></div>

    <div class="content">
        <div class="title">Day {{ loop.index }} - {{ day.title }}</div>
        <div class="desc">{{ day.description }}</div>
    </div>

</div>
{% endfor %}

</body>
</html>
